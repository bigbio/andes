<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 170" font-family="Inter, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="peak" x1="0" y1="24" x2="0" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="0.55" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>

  <!-- spectrum / mountain skyline: vertical peaks of varying height on the m/z baseline -->
  <g fill="url(#peak)">
    <rect x="28"  y="110" width="6" height="18" rx="2"/>
    <rect x="38"  y="96"  width="6" height="32" rx="2"/>
    <rect x="48"  y="102" width="6" height="26" rx="2"/>
    <rect x="58"  y="72"  width="6" height="56" rx="2"/>
    <rect x="68"  y="50"  width="6" height="78" rx="2"/>
    <rect x="78"  y="34"  width="6" height="94" rx="2"/>
    <rect x="88"  y="56"  width="6" height="72" rx="2"/>
    <rect x="98"  y="80"  width="6" height="48" rx="2"/>
    <rect x="108" y="68"  width="6" height="60" rx="2"/>
    <rect x="118" y="92"  width="6" height="36" rx="2"/>
    <rect x="128" y="104" width="6" height="24" rx="2"/>
    <rect x="138" y="116" width="6" height="12" rx="2"/>
  </g>

  <!-- snow cap on the dominant peak -->
  <polygon points="76,40 81,30 86,40" fill="#F8FAFC"/>

  <!-- m/z baseline (axis) -->
  <line x1="22" y1="128" x2="152" y2="128" stroke="#1E293B" stroke-width="2.4" stroke-linecap="round"/>
  <polygon points="152,124 160,128 152,132" fill="#1E293B"/>

  <!-- wordmark -->
  <text x="182" y="96" font-size="66" font-weight="700" letter-spacing="-1.5" fill="#0F172A">Andes</text>
  <!-- tagline -->
  <text x="184" y="124" font-size="15.5" font-weight="500" letter-spacing="0.2" fill="#475569">data-driven peptide search · quantms ecosystem</text>
</svg>
